{% set name = "ansys-rocky-core" %}
{% set version = "0.6.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ansys_rocky_core-{{ version }}.tar.gz
  sha256: f84e69832c9c2c43c906251e30e59fed36cd4b1b433637c53f394c2808768e64

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.2,<4
    - pip
  run:
    - python >={{ python_min }}
    - importlib-metadata >=4.0
    - pyro5 >=5.13
    - numpy >=1.19,<3.0
    - ansys-tools-common >=0.4.5
    - click ==8.3.1
    - docker-py >=7.1.0
test:
  imports:
    - ansys.rocky.core
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://rocky.docs.pyansys.com/
  summary: Python client library for Ansys Rocky
  dev_url: https://github.com/ansys/pyrocky
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - femarchi
    - Adrian-B-Moreira
    - fingeraugusto
    - igortg
